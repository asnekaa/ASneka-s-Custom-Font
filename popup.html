<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>字体设置</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <h2>✨ ASneka's Font</h2>
        </header>

        <div class="form-group">
            <label for="fontFamily">字体设置</label>
            <select id="fontFamily" class="font-select">
                <option value="" disabled selected>正在加载系统字体...</option>
            </select>

            <div class="font-preview" id="fontPreview">
                The quick brown fox jumps over the lazy dog.<br>
                敏捷的棕色狐狸跳过懒惰的狗。
            </div>
        </div>

        <div class="form-group">
            <label>工作模式</label>
            <div class="segmented-control">
                <input type="radio" name="mode" id="mode-blacklist" value="blacklist" checked>
                <label for="mode-blacklist">🚫 黑名单</label>

                <input type="radio" name="mode" id="mode-whitelist" value="whitelist">
                <label for="mode-whitelist">✅ 白名单</label>

                <div class="slider"></div>
            </div>
        </div>

        <div class="form-group">
            <label>网站列表</label>
            <div class="tag-input-wrapper">
                <div id="domainTags" class="tag-container"></div>
                <input type="text" id="domainInput" placeholder="输入域名并按回车添加...">
            </div>
        </div>

        <div class="actions">
            <button id="addCurrentBtn" class="btn-secondary" title="添加当前标签页域名">➕ 当前网站</button>
            <button id="saveBtn" class="btn-primary">💾 保存并刷新</button>
        </div>

        <div id="status" class="status-msg hidden">✅ 设置已保存！</div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
