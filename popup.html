<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>字体设置</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <header>
            <h2>✨ ASneka's Custom Font</h2>
        </header>

        <div class="form-group">
            <label for="fontFamily">字体设置</label>
            <select id="fontFamily" class="font-select">
                <option value="" disabled selected>正在加载系统字体...</option>
            </select>
        </div>
            
        <div class="form-group">
            <label>工作模式</label>
            <div class="segmented-control">
                <input type="radio" name="mode" id="mode-blacklist" value="blacklist" checked>
                <label for="mode-blacklist">🚫 黑名单</label>

                <input type="radio" name="mode" id="mode-whitelist" value="whitelist">
                <label for="mode-whitelist">✅ 白名单</label>

                <div class="slider"></div>
            </div>
        </div>

        <div class="form-group">
            <label>网站列表</label>
            <div class="tag-input-wrapper">
                <div id="domainTags" class="tag-container"></div>
                <input type="text" id="domainInput" placeholder="输入域名并按回车添加...">
            </div>
        </div>

        <div class="actions">
            <button id="addCurrentBtn" class="btn-secondary" title="添加当前标签页域名">➕ 添加当前网站至列表</button>
        </div>
        
        <div class="actions">
            <button id="exportBtn" class="btn-secondary">📤 导出配置</button>
            <button id="importBtn" class="btn-secondary">📥 导入配置</button>
            <!-- 隐藏的文件选择器，限制只能选择 JSON 文件 -->
            <input type="file" id="importFile" accept=".json" style="display: none;">
        </div>
        </div>
        <script src="popup.js"></script>
</body>

</html>
